<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
        font-family: Arial;
        text-align: center;
        }
        .menu-buttons button {
        margin: 5px;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        }
        #title {
        margin: 20px 0;
        font-size: 24px;
        font-weight: bold;
        }
        #loader {
        display: none;
        font-size: 18px;
        color: gray;
        }
        .cards {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        }
        .card {
        border: 1px solid #ddd;
        padding: 10px;
        width: 200px;
        height: 200px;
        text-align: left;
        border-radius: 8px;
        }
        .card img {
        width: 100%;
        height: 50%;
        border-radius: 5px;
        }
        .card h4 {
        margin: 10px 0 5px;
        }
        .card p {
        font-size: 14px;
        color: #555;
        }
    </style>
</head>
<body>
    <div class="menu-buttons">
        <button onclick="loadMenu('pizza')">Pizza</button>
        <button onclick="loadMenu('salad')">Salad</button>
        <button onclick="loadMenu('beef')">Beef</button>
        <button onclick="loadMenu('pasta')">Pasta</button>
    </div>
    <div id="title">Choose a menu to view items</div>
    <div id="loader">Loading...</div>
    <div class="cards" id="cardContainer"></div>

    <script src="script.js"></script>
</body>
</html>
